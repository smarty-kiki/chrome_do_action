<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 24px;
      color: #333;
    }
    h2 { font-size: 18px; margin-bottom: 20px; color: #1a73e8; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    input[type="text"]:focus { outline: none; border-color: #1a73e8; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .toggle-row label { margin: 0; }
    .toggle {
      position: relative;
      width: 44px; height: 24px;
      background: #ccc; border-radius: 12px;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle.on { background: #1a73e8; }
    .toggle::after {
      content: "";
      position: absolute; top: 2px; left: 2px;
      width: 20px; height: 20px;
      background: white; border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(20px); }
    .btn {
      padding: 8px 20px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn:hover { background: #1557b0; }
    .status { font-size: 12px; color: #666; margin-left: 8px; }
    .retry-box {
      margin-top: 12px;
      padding: 10px 12px;
      background: #f5f5f5;
      border-radius: 6px;
      font-size: 13px;
    }
    .retry-box .retry-line {
      margin: 4px 0;
      color: #555;
    }
    .retry-box .retry-line.error { color: #F44336; }
    .retry-box .retry-line.countdown { color: #FF9800; }
    .retry-box .retry-line.connecting { color: #FF9800; }
    .retry-box .retry-line.success { color: #4CAF50; }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>
  <h2>插件配置</h2>

  <div class="field">
    <label>节点名称</label>
    <input type="text" id="nodeName" placeholder="给这个浏览器节点起个名字" />
  </div>

  <div class="field">
    <label>服务端 WebSocket 地址</label>
    <input type="text" id="serverUrl" placeholder="ws://host:port" />
  </div>

  <div class="toggle-row">
    <label>自动连接</label>
    <div class="toggle on" id="autoConnectToggle"></div>
  </div>

  <button class="btn" id="btnSave">保存</button>

  <div class="section-title">连接操作</div>
  <button class="btn" id="btnConnect" style="margin-right: 8px;">立即连接</button>
  <button class="btn" id="btnDisconnect" style="background: #666;">断开</button>

  <div class="retry-box" id="retryBox" style="display: none;">
    <div class="retry-line" id="retryLine"></div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
