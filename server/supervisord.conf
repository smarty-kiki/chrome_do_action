[program:chrome-do-action-server]
command=node dist/server.js --port 12345 --log-dir /tmp/chrome/
directory=/var/www/chrome-do-action
autostart=true
autorestart=true
startsecs=1
stopwaitsecs=5
stderr_logfile=/tmp/chrome/supervisor-err.log
stdout_logfile=/tmp/chrome/supervisor-out.log
environment=NODE_ENV=production
